# LLM Pool Configuration Example
#
# This file demonstrates how to configure the LLM load balancer
# Copy this to config.yaml and modify as needed

server:
  host: 0.0.0.0
  port: 3000
  logLevel: info
  cors:
    enabled: true
    origins:
      - "*"
  auth:
    enabled: false
    apiKeys: []

# Backend configurations
backends:
  # OpenAI backend
  - id: openai-gpt4
    provider: openai
    baseUrl: https://api.openai.com/v1
    apiKey: ${OPENAI_API_KEY}
    model: gpt-4
    weight: 1
    maxConcurrent: 10
    timeout: 60000
    enabled: true
    temperature: 0.7
    maxTokens: 4096

  # Anthropic backend
  - id: anthropic-claude
    provider: anthropic
    baseUrl: https://api.anthropic.com
    apiKey: ${ANTHROPIC_API_KEY}
    model: claude-3-5-sonnet-20241022
    weight: 1
    maxConcurrent: 10
    timeout: 60000
    enabled: true
    temperature: 0.7
    maxTokens: 4096

  # Local Ollama backend
  - id: ollama-llama
    provider: ollama
    baseUrl: http://localhost:11434/v1
    apiKey: not-required
    model: llama3.1
    weight: 2
    maxConcurrent: 5
    timeout: 120000
    enabled: true

# Virtual models (models exposed to clients)
virtualModels:
  - name: gpt-4
    strategy: weighted
    backends:
      - openai-gpt4
    fallback: next-backend
    streamingEnabled: true

  - name: claude-sonnet
    strategy: weighted
    backends:
      - anthropic-claude
    fallback: next-backend
    streamingEnabled: true

  - name: llama3
    strategy: weighted
    backends:
      - ollama-llama
    fallback: next-backend
    streamingEnabled: true

  # Combined model using multiple backends
  - name: balanced
    strategy: weighted
    backends:
      - openai-gpt4
      - anthropic-claude
      - ollama-llama
    fallback: next-backend
    streamingEnabled: true
