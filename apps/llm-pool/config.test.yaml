# Simple test config
server:
  host: 0.0.0.0
  port: 3000
  logLevel: debug

backends:
  # Using environment variables for API keys
  - id: openai-gpt4
    provider: openai
    apiKey: ${OPENAI_API_KEY:-test-key}
    model: gpt-4
    weight: 1
    maxConcurrent: 5
    timeout: 30000
    enabled: true

virtualModels:
  - name: gpt-4
    strategy: weighted
    backends:
      - openai-gpt4
    fallback: error
    streamingEnabled: true
