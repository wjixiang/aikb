# ==========================================
# Case Hub - Docker Compose Configuration
# Medical case management service
# ==========================================

services:
  # ----------------------------------------
  # Case Hub Application
  # ----------------------------------------
  case-hub:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: case-hub
    restart: unless-stopped
    ports:
      - "${PORT:-3002}:3002"
    environment:
      # Application
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-3002}
      - HOST=${HOST:-0.0.0.0}

      # Database
      - DATABASE_URL=postgresql://${DB_USER:-casehub}:${DB_PASSWORD:-casehub_secret}@postgres:5432/${DB_NAME:-case_hub}?schema=public
      - DATABASE_POOL_SIZE=${DATABASE_POOL_SIZE:-10}
      - DATABASE_TIMEOUT=${DATABASE_TIMEOUT:-30000}

      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=${LOG_FORMAT:-json}

      # Storage
      - STORAGE_TYPE=${STORAGE_TYPE:-local}
      - STORAGE_PATH=${STORAGE_PATH:-/app/storage/cases}
      - STORAGE_MAX_SIZE=${STORAGE_MAX_SIZE:-10485760}

      # API
      - API_PREFIX=${API_PREFIX:-api}
      - API_VERSION=${API_VERSION:-v1}

      # Rate Limiting
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED:-true}
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS:-60000}
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-100}

      # Cache
      - CACHE_ENABLED=${CACHE_ENABLED:-true}
      - CACHE_TTL=${CACHE_TTL:-300}

      # CORS
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - CORS_CREDENTIALS=${CORS_CREDENTIALS:-true}

      # LLM API Keys
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GLM_API_KEY=${GLM_API_KEY:-}

    volumes:
      - case_hub_storage:/app/storage/cases
      - case_hub_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - case-hub-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/api/health', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ----------------------------------------
  # PostgreSQL Database
  # ----------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: case-hub-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER:-casehub}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-casehub_secret}
      - POSTGRES_DB=${DB_NAME:-case_hub}
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/setup-db.sh:/docker-entrypoint-initdb.d/setup-db.sh:ro
    networks:
      - case-hub-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-casehub} -d ${DB_NAME:-case_hub}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ----------------------------------------
  # Database Migration Service (runs once)
  # ----------------------------------------
  db-migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: case-hub-migrate
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-casehub}:${DB_PASSWORD:-casehub_secret}@postgres:5432/${DB_NAME:-case_hub}?schema=public
    command: >
      sh -c "pnpm prisma:migrate && pnpm db:seed"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - case-hub-network
    profiles:
      - migrate

networks:
  case-hub-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  case_hub_storage:
    driver: local
  case_hub_logs:
    driver: local
