services:
  redis:
    image: redis:trixie
    container_name: redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf
      - redis_logs:/logs
    command: redis-server /usr/local/etc/redis/redis.conf

  db-master:
    image: pgvector/pgvector:pg16-trixie
    restart: always
    environment:
      POSTGRES_PASSWORD: fl5ox03
      POSTGRES_USER: admin
      POSTGRES_DB: biblib
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - main-network

  iceberg-catalog-db:
    image: postgres:16
    container_name: iceberg-catalog-db
    restart: always
    env_file: ../.env
    environment:
      POSTGRES_PASSWORD: ${ICEBERG_DB_PASSWORD}
      POSTGRES_USER: ${ICEBERG_DB_USER}
      POSTGRES_DB: ${ICEBERG_DB_NAME}
    volumes:
      - iceberg_catalog_db_data:/var/lib/postgresql/data
    networks:
      - iceberg_net

  garage:
    image: dxflrs/garage:v2.0.0
    container_name: garage
    volumes:
      - ./garage/garage.toml:/etc/garage.toml
      - ./garage/meta:/var/lib/garage/meta
      - ./garage/data:/mnt/disk1
      - /mnt/disk2/garage/data:/mnt/disk2
    restart: unless-stopped
    networks:
      iceberg_net:
    ports:
      - 3900:3900
      - 3901:3901
      - 3902:3902
      - 3903:3903

  webui:
    image: khairul169/garage-webui:latest
    container_name: garage-webui
    restart: unless-stopped
    volumes:
      - ./garage/garage.toml:/etc/garage.toml:ro
    networks:
      iceberg_net:
    ports:
      - 3909:3909
    environment:
      API_BASE_URL: "http://garage:3903"
      S3_ENDPOINT_URL: "http://garage:3900"

  iceberg-rest:
    image: tabulario/iceberg-rest:latest
    container_name: iceberg-rest
    restart: always
    depends_on:
      - iceberg-catalog-db
      - garage
    networks:
      - iceberg_net
    env_file: ../.env
    ports:
      - ${ICEBERG_REST_PORT}:8181
    environment:
      - CATALOG_WAREHOUSE=${ICEBERG_S3_WAREHOUSE}
      - CATALOG_URI=jdbc:postgresql://iceberg-catalog-db:5432/${ICEBERG_DB_NAME}
      - CATALOG_JDBC_USER=${ICEBERG_DB_USER}
      - CATALOG_JDBC_PASSWORD=${ICEBERG_DB_PASSWORD}
      - CATALOG_CATALOG__IMPL=org.apache.iceberg.jdbc.JdbcCatalog
      - CATALOG_IO__IMPL=org.apache.iceberg.aws.s3.S3FileIO
      - CATALOG_S3_ENDPOINT=${ICEBERG_S3_ENDPOINT_INTERNAL}
      - CATALOG_S3_PATH__STYLE__ACCESS=true
      - CATALOG_S3_ACCESS__KEY__ID=${ICEBERG_S3_ACCESS_KEY_ID}
      - CATALOG_S3_SECRET__ACCESS__KEY=${ICEBERG_S3_SECRET_ACCESS_KEY}
      - CATALOG_S3_REGION=${ICEBERG_S3_REGION}
      - AWS_REGION=${ICEBERG_S3_REGION}

  spark-iceberg:
    image: tabulario/spark-iceberg
    container_name: spark-iceberg
    networks:
      iceberg_net:
    depends_on:
      - iceberg-rest
      - garage
    volumes:
      - ./warehouse:/home/iceberg/warehouse
      - ./notebooks:/home/iceberg/notebooks/notebooks
    env_file: ../.env
    environment:
      - AWS_ACCESS_KEY_ID=${ICEBERG_S3_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${ICEBERG_S3_SECRET_ACCESS_KEY}
      - AWS_REGION=${ICEBERG_S3_REGION}
    ports:
      - 8889:8888
      - 8080:8080
      - 10000:10000
      - 10001:10001
    command: >
      bash -c "
      /opt/spark/bin/start-thriftserver.sh --master local[*] \
        --conf spark.sql.catalog.demo=org.apache.iceberg.spark.SparkCatalog \
        --conf spark.sql.catalog.demo.catalog-impl=org.apache.iceberg.rest.RESTCatalog \
        --conf spark.sql.catalog.demo.uri=http://iceberg-rest:8181 \
        --conf spark.sql.default_catalog=demo \
        --hiveconf hive.server2.thrift.port=10000 & \
      jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser --allow-root & \
      tail -f /dev/null
      "

networks:
  main-network:
    driver: bridge
  iceberg_net:
    driver: bridge

volumes:
  redis_data:
  redis_logs:
  postgres_data:
  iceberg_catalog_db_data:
  mineru_data:
