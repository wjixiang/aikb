services:
  redis:
    image: redis:trixie
    container_name: redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf
      - redis_logs:/logs
    command: redis-server /usr/local/etc/redis/redis.conf

  db-master:
    image: pgvector/pgvector:pg16-trixie
    restart: always
    environment:
      POSTGRES_PASSWORD: fl5ox03
      POSTGRES_USER: admin
      POSTGRES_DB: biblib
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - main-network

  iceberg-catalog-db:
    image: postgres:16
    container_name: iceberg-catalog-db
    restart: always
    environment:
      POSTGRES_PASSWORD: ${ICEBERG_DB_PASSWORD}
      POSTGRES_USER: ${ICEBERG_DB_USER}
      POSTGRES_DB: ${ICEBERG_DB_NAME}
    volumes:
      - iceberg_catalog_db_data:/var/lib/postgresql/data
    networks:
      - iceberg_net

  minio:
    image: minio/minio
    container_name: minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      iceberg_net:
        aliases:
          - warehouse.minio
    ports:
      - ${MINIO_PORT_CONSOLE}:9001
      - ${MINIO_PORT_API}:9000
    command: ["server", "/data", "--console-address", ":9001"]

  mc:
    depends_on:
      - minio
    image: minio/mc
    container_name: mc
    networks:
      iceberg_net:
    environment:
      AWS_ACCESS_KEY_ID: ${ICEBERG_S3_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${ICEBERG_S3_SECRET_ACCESS_KEY}
      AWS_REGION: ${ICEBERG_S3_REGION}
    entrypoint: |
      /bin/sh -c "
      until (/usr/bin/mc alias set minio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}) do echo '...waiting...' && sleep 1; done;
      /usr/bin/mc mb --ignore-existing minio/warehouse;
      /usr/bin/mc anonymous set public minio/warehouse;
      tail -f /dev/null
      "

  iceberg-rest:
    image: tabulario/iceberg-rest:latest
    container_name: iceberg-rest
    restart: always
    depends_on:
      - iceberg-catalog-db
      - minio
    networks:
      - iceberg_net
    ports:
      - ${ICEBERG_REST_PORT}:8181
    environment:
      - CATALOG_WAREHOUSE=${ICEBERG_S3_WAREHOUSE}
      - CATALOG_URI=jdbc:postgresql://iceberg-catalog-db:5432/${ICEBERG_DB_NAME}
      - CATALOG_JDBC_USER=${ICEBERG_DB_USER}
      - CATALOG_JDBC_PASSWORD=${ICEBERG_DB_PASSWORD}
      - CATALOG_CATALOG__IMPL=org.apache.iceberg.jdbc.JdbcCatalog
      - CATALOG_IO__IMPL=org.apache.iceberg.aws.s3.S3FileIO
      - CATALOG_S3_ENDPOINT=${ICEBERG_S3_ENDPOINT}
      - CATALOG_S3_PATH__STYLE__ACCESS=true
      - CATALOG_S3_ACCESS__KEY__ID=${ICEBERG_S3_ACCESS_KEY_ID}
      - CATALOG_S3_SECRET__ACCESS__KEY=${ICEBERG_S3_SECRET_ACCESS_KEY}
      - CATALOG_S3_REGION=${ICEBERG_S3_REGION}
      - AWS_REGION=${ICEBERG_S3_REGION}

  spark-iceberg:
    image: tabulario/spark-iceberg
    container_name: spark-iceberg
    networks:
      iceberg_net:
    depends_on:
      - iceberg-rest
      - minio
    volumes:
      - ./warehouse:/home/iceberg/warehouse
      - ./notebooks:/home/iceberg/notebooks/notebooks
    environment:
      - AWS_ACCESS_KEY_ID=${ICEBERG_S3_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${ICEBERG_S3_SECRET_ACCESS_KEY}
      - AWS_REGION=${ICEBERG_S3_REGION}
    ports:
      - 8889:8888
      - 8080:8080
      - 10000:10000
      - 10001:10001

  rustfs:
    image: rustfs/rustfs:latest
    restart: always
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - rustfs_disk2:/data
      - rustfs_disk1:/data/disk1
      - rustfs_logs:/logs
    networks:
      - main-network

networks:
  main-network:
    driver: bridge
  iceberg_net:
    driver: bridge

volumes:
  redis_data:
  redis_logs:
  postgres_data:
  minio_data:
  iceberg_catalog_db_data:
  rustfs_disk1:
    driver: local
    driver_opts:
      type: none
      device: /mnt/disk1/rustfs
      o: bind
  rustfs_disk2:
    driver: local
    driver_opts:
      type: none
      device: /mnt/disk2/rustfs
      o: bind
  rustfs_logs:
  mineru_data:
