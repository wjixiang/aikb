  rustfs:
    image: rustfs/rustfs:latest
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - rustfs_data:/data
      - rustfs_logs:/logs
    networks:
      - bib-network

networks:
  bib-network:
    driver: bridge

volumes:
  redis_data:
  redis_logs:
  postgres_data:
  postgres_shard_0:
  postgres_shard_1:
  postgres_shard_2:
  postgres_shard_3:
  rustfs_data:
