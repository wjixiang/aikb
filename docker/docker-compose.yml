services:
  redis:
    image: redis:trixie
    container_name: redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf
      - redis_logs:/logs
    command: redis-server /usr/local/etc/redis/redis.conf

  db-master:
    image: pgvector/pgvector:pg16-trixie
    restart: always
    environment:
      POSTGRES_PASSWORD: fl5ox03
      POSTGRES_USER: admin
      POSTGRES_DB: biblib
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - main-network
  spark-iceberg:
    image: tabulario/spark-iceberg
    container_name: spark-iceberg
    # build: spark/
    networks:
      iceberg_net:
    depends_on:
      - rest
      - minio
      - mc
    volumes:
      - ./warehouse:/home/iceberg/warehouse
      - ./notebooks:/home/iceberg/notebooks/notebooks
    environment:
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=password
      - AWS_REGION=us-east-1
    ports:
      - 8889:8888
      - 8080:8080
      - 10000:10000
      - 10001:10001
  rest:
    image: apache/iceberg-rest-fixture
    container_name: iceberg-rest
    networks:
      iceberg_net:
    depends_on:
      - mc
    ports:
      - 8181:8181
    environment:
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=password
      - AWS_REGION=us-east-1
      - CATALOG_WAREHOUSE=s3://warehouse/
      - CATALOG_IO__IMPL=org.apache.iceberg.aws.s3.S3FileIO
      - CATALOG_S3_ENDPOINT=http://minio:9000
  minio:
    image: minio/minio
    container_name: minio
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password
      - MINIO_DOMAIN=minio
    networks:
      iceberg_net:
        aliases:
          - warehouse.minio
    ports:
      - 9901:9001
      - 9900:9000
    command: ["server", "/data", "--console-address", ":9001"]
  mc:
    depends_on:
      - minio
    image: minio/mc
    container_name: mc
    networks:
      iceberg_net:
    environment:
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=password
      - AWS_REGION=us-east-1
    entrypoint: |
      /bin/sh -c "
      until (/usr/bin/mc alias set minio http://minio:9000 admin password) do echo '...waiting...' && sleep 1; done;
      /usr/bin/mc rm -r --force minio/warehouse;
      /usr/bin/mc mb minio/warehouse;
      /usr/bin/mc policy set public minio/warehouse;
      tail -f /dev/null
      "
  # garage:
  #   image: dxflrs/garage:v2.2.0
  #   ports:
  #     - '3900:3900'
  #     - '3901:3901'
  #     - '3902:3902'
  #     - '3903:3903'
  #   volumes:
  #     - /etc/garage.toml:/etc/garage.toml
  #     - /mnt/disk2/garage/meta:/var/lib/garage/meta
  #     - /mnt/disk2/garage/data:/var/lib/garage/data
  rustfs:
    image: rustfs/rustfs:latest
    restart: always
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - rustfs_disk2:/data
      - rustfs_disk1:/data/disk1
      - rustfs_logs:/logs
    networks:
      - main-network

networks:
  main-network:
    driver: bridge
  iceberg_net:
    driver: bridge

volumes:
  redis_data:
  redis_logs:
  postgres_data:
  iceberg_catalog_data:
  rustfs_disk1:
    driver: local
    driver_opts:
      type: none
      device: /mnt/disk1/rustfs
      o: bind
  rustfs_disk2:
    driver: local
    driver_opts:
      type: none
      device: /mnt/disk2/rustfs
      o: bind
  rustfs_logs:
  mineru_data:
