# =============================================================================
# File Renderer Service - Docker Compose 完整部署配置
# =============================================================================
# 使用方法:
#   1. 复制 .env.example 为 .env 并填写实际配置
#   2. 运行: docker-compose up -d
#   3. 访问: http://localhost:8000
# =============================================================================

version: '3.8'

services:
  # ===========================================================================
  # File Renderer 主服务
  # ===========================================================================
  file-renderer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: file-renderer
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8000}:8000"
    environment:
      # 数据库配置
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/filerenderer}

      # S3 配置
      - S3_ENDPOINT=${S3_ENDPOINT:-minio:9000}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-minioadmin}
      - S3_ACCESS_KEY_SECRET=${S3_ACCESS_KEY_SECRET:-minioadmin}
      - S3_BUCKET=${S3_BUCKET:-agentfs}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_FORCE_PATH_STYLE=${S3_FORCE_PATH_STYLE:-true}

      # 服务器配置
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8000
      - SERVER_LOG_LEVEL=${SERVER_LOG_LEVEL:-INFO}

      # 分页配置
      - DEFAULT_PAGE_SIZE=${DEFAULT_PAGE_SIZE:-4000}
      - SEMANTIC_CHUNK_SIZE=${SEMANTIC_CHUNK_SIZE:-2000}
      - SEMANTIC_OVERLAP=${SEMANTIC_OVERLAP:-200}

      # 转换配置
      - CONVERSION_MAX_FILE_SIZE=${CONVERSION_MAX_FILE_SIZE:-104857600}
      - CONVERSION_TIMEOUT=${CONVERSION_TIMEOUT:-300}
      - CONVERSION_ENABLE_OCR=${CONVERSION_ENABLE_OCR:-true}
      - CONVERSION_MAX_WORKERS=${CONVERSION_MAX_WORKERS:-4}
      - CONVERSION_ENABLE_CACHE=${CONVERSION_ENABLE_CACHE:-true}

      # 应用配置
      - DEBUG=${DEBUG:-false}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - /etc/localtime:/etc/localtime:ro
    networks:
      - file-renderer-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G

  # ===========================================================================
  # PostgreSQL 数据库
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: file-renderer-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-filerenderer}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - file-renderer-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  # ===========================================================================
  # MinIO 对象存储
  # ===========================================================================
  minio:
    image: minio/minio:latest
    container_name: file-renderer-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
      - MINIO_BROWSER=on
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    networks:
      - file-renderer-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  # ===========================================================================
  # MinIO 初始化 (创建 bucket)
  # ===========================================================================
  minio-init:
    image: minio/mc:latest
    container_name: file-renderer-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for MinIO to be ready...';
      sleep 5;
      /usr/bin/mc config host add myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      echo 'Creating bucket...';
      /usr/bin/mc mb myminio/${S3_BUCKET:-agentfs} || true;
      echo 'Setting bucket policy...';
      /usr/bin/mc policy set public myminio/${S3_BUCKET:-agentfs} || true;
      echo 'MinIO initialization completed';
      exit 0;
      "
    networks:
      - file-renderer-network
    restart: "no"

  # ===========================================================================
  # (可选) Redis 缓存
  # 取消注释以下部分以启用 Redis
  # ===========================================================================
  # redis:
  #   image: redis:7-alpine
  #   container_name: file-renderer-redis
  #   restart: unless-stopped
  #   volumes:
  #     - redis_data:/data
  #   ports:
  #     - "6379:6379"
  #   networks:
  #     - file-renderer-network
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 3

  # ===========================================================================
  # (可选) Nginx 反向代理
  # 取消注释以下部分以启用 Nginx
  # ===========================================================================
  # nginx:
  #   image: nginx:alpine
  #   container_name: file-renderer-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - file-renderer
  #   networks:
  #     - file-renderer-network

# =============================================================================
# 数据卷
# =============================================================================
volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
  # redis_data:
  #   driver: local

# =============================================================================
# 网络配置
# =============================================================================
networks:
  file-renderer-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
