# =============================================================================
# File Renderer Service - Docker Compose 完整部署配置
# =============================================================================
# 使用方法:
#   1. 复制 .env.example 为 .env 并填写实际配置
#   2. 运行: docker-compose up -d
#   3. 访问: http://localhost:8000
# =============================================================================

version: '3.8'

services:
  # ===========================================================================
  # File Renderer 主服务
  # ===========================================================================
  file-renderer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: file-renderer
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8000}:8000"
    environment:
      # 数据库配置
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/filerenderer}

      # S3 配置
      - S3_ENDPOINT=${S3_ENDPOINT:-garage:3900}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-GK8ce6384a8b85bdf9d02544ef}
      - S3_ACCESS_KEY_SECRET=${S3_ACCESS_KEY_SECRET:-40514871820daa868256d43858ebb2c27984badc6417906315c45ff82eb0c6e7}
      - S3_BUCKET=${S3_BUCKET:-agentfs}
      - S3_REGION=${S3_REGION:-garage}
      - S3_FORCE_PATH_STYLE=${S3_FORCE_PATH_STYLE:-true}

      # 服务器配置
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8000
      - SERVER_LOG_LEVEL=${SERVER_LOG_LEVEL:-INFO}

      # 分页配置
      - DEFAULT_PAGE_SIZE=${DEFAULT_PAGE_SIZE:-4000}
      - SEMANTIC_CHUNK_SIZE=${SEMANTIC_CHUNK_SIZE:-2000}
      - SEMANTIC_OVERLAP=${SEMANTIC_OVERLAP:-200}

      # 转换配置
      - CONVERSION_MAX_FILE_SIZE=${CONVERSION_MAX_FILE_SIZE:-104857600}
      - CONVERSION_TIMEOUT=${CONVERSION_TIMEOUT:-300}
      - CONVERSION_ENABLE_OCR=${CONVERSION_ENABLE_OCR:-true}
      - CONVERSION_MAX_WORKERS=${CONVERSION_MAX_WORKERS:-4}
      - CONVERSION_ENABLE_CACHE=${CONVERSION_ENABLE_CACHE:-true}

      # 应用配置
      - DEBUG=${DEBUG:-false}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - /etc/localtime:/etc/localtime:ro
    networks:
      - file-renderer-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G

  # ===========================================================================
  # PostgreSQL 数据库
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: file-renderer-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-filerenderer}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - file-renderer-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  # ===========================================================================
  # Garage 对象存储
  # ===========================================================================
  garage:
    image: dxflrs/garage:v2.0.0
    container_name: file-renderer-garage
    restart: unless-stopped
    volumes:
      - ./garage/garage.toml:/etc/garage.toml
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
    ports:
      - "3900:3900"
      - "3901:3901"
      - "3903:3903"
    networks:
      - file-renderer-network

  # ===========================================================================
  # (可选) Redis 缓存
  # 取消注释以下部分以启用 Redis
  # ===========================================================================
  # redis:
  #   image: redis:7-alpine
  #   container_name: file-renderer-redis
  #   restart: unless-stopped
  #   volumes:
  #     - redis_data:/data
  #   ports:
  #     - "6379:6379"
  #   networks:
  #     - file-renderer-network
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 3

  # ===========================================================================
  # (可选) Nginx 反向代理
  # 取消注释以下部分以启用 Nginx
  # ===========================================================================
  # nginx:
  #   image: nginx:alpine
  #   container_name: file-renderer-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - file-renderer
  #   networks:
  #     - file-renderer-network

# =============================================================================
# 数据卷
# =============================================================================
volumes:
  postgres_data:
    driver: local
  garage_meta:
    driver: local
  garage_data:
    driver: local
  # redis_data:
  #   driver: local

# =============================================================================
# 网络配置
# =============================================================================
networks:
  file-renderer-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
